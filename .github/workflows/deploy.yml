name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Capture commit and trigger timestamps
        id: timestamps
        run: |
          echo "commit_ts=$(git log -1 --format=%ct)" >> "$GITHUB_OUTPUT"
          echo "trigger_ts=$(date +%s)" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build application
        id: build
        run: |
          # Install dependencies
          pip install --upgrade pip
          pip install -r requirements.txt
          
          # Add your actual build commands here
          # Example: python setup.py build
          
          echo "build_end_ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Run tests
        id: test
        run: |
          # Install test dependencies
          pip install pytest pytest-cov

          # Run tests with CI flag
          pytest --ci --cov=.

          echo "test_end_ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.APP_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to app server
        id: deploy
        run: |
          # Copy application files to remote server
          scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -r . appuser@${{ secrets.APP_SERVER_IP }}:/opt/demo-app/

          # Run deployment commands on remote server
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              appuser@${{ secrets.APP_SERVER_IP }} << 'ENDSSH'
            set -euo pipefail
            cd /opt/demo-app

            # Check if dependencies changed by comparing md5 hashes
            NEW_HASH=$(md5sum requirements.txt | cut -d' ' -f1)
            OLD_HASH=$(cat .req_hash 2>/dev/null || echo "")

            # Install/update dependencies only if requirements.txt changed
            if [ "$OLD_HASH" != "$NEW_HASH" ]; then
              echo "Dependencies changed. Installing..."
              venv/bin/python -m pip install --quiet -r requirements.txt
              echo "$NEW_HASH" > .req_hash
            else
              echo "Dependencies unchanged. Skipping pip install."
            fi

            # Restart the application
            sudo systemctl restart app
          ENDSSH

          echo "deploy_ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Capture incident timestamps
        id: incident
        if: always()
        run: |
          echo "incident_start_ts=${{ steps.deploy.outputs.deploy_ts || steps.timestamps.outputs.trigger_ts }}" >> "$GITHUB_OUTPUT"
          echo "incident_end_ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Push DORA metrics to Prometheus Pushgateway
        if: always()
        env:
          PUSHGATEWAY_URL: ${{ secrets.PUSHGATEWAY_URL }}
          COMMIT_TS:         ${{ steps.timestamps.outputs.commit_ts }}
          TRIGGER_TS:        ${{ steps.timestamps.outputs.trigger_ts }}
          BUILD_END_TS:      ${{ steps.build.outputs.build_end_ts }}
          TEST_END_TS:       ${{ steps.test.outputs.test_end_ts }}
          DEPLOY_TS:         ${{ steps.deploy.outputs.deploy_ts }}
          INCIDENT_START_TS: ${{ steps.incident.outputs.incident_start_ts }}
          INCIDENT_END_TS:   ${{ steps.incident.outputs.incident_end_ts }}
          COMMIT_SHA:        ${{ steps.timestamps.outputs.commit_sha }}
          WORKFLOW:          ${{ github.workflow }}
          RUN_ID:            ${{ github.run_id }}
          BRANCH:            ${{ github.ref_name }}
          ACTOR:             ${{ github.actor }}
        run: |
          set -euo pipefail

          NOW=$(date +%s)

          if [ "${{ job.status }}" = "success" ]; then
            RESULT="success"
          elif [ "${{ steps.deploy.outcome }}" = "failure" ]; then
            RESULT="failure"
          else
            RESULT="rollback"
          fi

          LEAD_TIME=$(( ${DEPLOY_TS:-$NOW} - ${COMMIT_TS:-$NOW} ))
          PIPELINE_DURATION=$(( ${DEPLOY_TS:-$NOW} - ${TRIGGER_TS:-$NOW} ))
          BUILD_DURATION=$(( ${BUILD_END_TS:-$NOW} - ${TRIGGER_TS:-$NOW} ))
          TEST_DURATION=$(( ${TEST_END_TS:-$NOW} - ${BUILD_END_TS:-$NOW} ))

          if [ "${RESULT}" != "success" ]; then
            INCIDENT_DURATION=$(( ${INCIDENT_END_TS:-$NOW} - ${INCIDENT_START_TS:-$NOW} ))
          else
            INCIDENT_DURATION=0
          fi

          cat <<EOF | curl --silent --max-time 10 --data-binary @- \
            "${PUSHGATEWAY_URL}/metrics/job/github_actions/instance/${RUN_ID}"
          # HELP github_actions_deployments_total Total deployment count by result
          # TYPE github_actions_deployments_total counter
          github_actions_deployments_total{environment="production",result="${RESULT}",workflow="${WORKFLOW}",branch="${BRANCH}",actor="${ACTOR}"} 1

          # HELP github_actions_lead_time_seconds Commit-to-production duration in seconds
          # TYPE github_actions_lead_time_seconds gauge
          github_actions_lead_time_seconds{workflow="${WORKFLOW}",commit="${COMMIT_SHA}"} ${LEAD_TIME}

          # HELP github_actions_pipeline_duration_seconds Full pipeline execution time in seconds
          # TYPE github_actions_pipeline_duration_seconds gauge
          github_actions_pipeline_duration_seconds{workflow="${WORKFLOW}"} ${PIPELINE_DURATION}

          # HELP github_actions_build_duration_seconds Build step duration in seconds
          # TYPE github_actions_build_duration_seconds gauge
          github_actions_build_duration_seconds{workflow="${WORKFLOW}"} ${BUILD_DURATION}

          # HELP github_actions_test_duration_seconds Test step duration in seconds
          # TYPE github_actions_test_duration_seconds gauge
          github_actions_test_duration_seconds{workflow="${WORKFLOW}"} ${TEST_DURATION}

          # HELP github_actions_incident_duration_seconds Time from deploy failure to resolution
          # TYPE github_actions_incident_duration_seconds gauge
          github_actions_incident_duration_seconds{workflow="${WORKFLOW}",result="${RESULT}"} ${INCIDENT_DURATION}
          EOF

          echo "DORA metrics pushed: result=${RESULT}, lead_time=${LEAD_TIME}s, pipeline=${PIPELINE_DURATION}s"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "Deployment failed. CFR alert will fire in Prometheus within 10 minutes."
          echo "Check #DevOps-Alerts in Slack for the structured alert payload."
          echo "Dashboard: ${{ secrets.GRAFANA_URL }}/d/dora-metrics"